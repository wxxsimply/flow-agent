# 微电影样片提质栈 — tiered：标准镜快、hero 镜 multi+BoN+HD i2v
# flowagent run micro-movie --plot "..." --stack micro-movie-wan-premiere

name: micro-movie-wan-premiere
version: "1.0"
description: 微电影 ~2.5min；tiered 制片，hero 镜多关键帧+BoN+wan2.6-i2v 1080P

target_duration_sec: 150
cost_budget_cny: 48

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
    fallback_model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: bailian
  model: wan2.6-t2i
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  style_prefix: |
    [STYLE] 电影感竖屏 9:16，写实与插画混合，高对比光影
    [NEG] 文字、水印、多余手指、横构图

assemble:
  llm_review: true

video:
  enabled: true
  provider: bailian
  strategy: image2video
  model: wan2.6-i2v-flash
  quality_model: wan2.6-i2v
  resolution: "720P"
  silent_audio: true
  all_shots: true
  require_video: true
  clip_duration_sec: 10
  keyframe_mode: tiered
  hero_shot_count: 3
  use_quality_model_for: hero
  inter_shot_delay_sec: 1
  max_parallel_shots: 2
  motion_prompt_suffix: "，镜头缓慢推进，人物动作小幅连贯，禁止静态海报定格，禁止穿模与瞬间位移"
  hero:
    resolution: "1080P"
    bon_candidates: 3
  wmreward_bon:
    enabled: true
    hero_only: true
    candidates: 2

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.4
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.22

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.20
  video_per_second: 0.10

cost_targets_cny:
  llm: [6, 12]
  tts: [4, 8]
  image: [5, 9]
  video: [10, 18]
  total: [32, 48]
