# 微电影快速预览栈 — 单关键帧、无 BoN、可并行 produce
# flowagent run micro-movie --plot "..." --stack micro-movie-wan-fast --target-duration-sec 90

name: micro-movie-wan-fast
version: "1.0"
description: 微电影 ~90s 预览；单关键帧 + flash i2v，无 BoN，produce 并行 2

target_duration_sec: 90
cost_budget_cny: 28

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
    fallback_model: qwen-max
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: bailian
  model: wan2.6-t2i
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  style_prefix: |
    [STYLE] 电影感竖屏 9:16，写实与插画混合，高对比光影
    [NEG] 文字、水印、多余手指、横构图

assemble:
  llm_review: false

video:
  enabled: true
  provider: bailian
  strategy: image2video
  model: wan2.6-i2v-flash
  quality_model: wan2.6-i2v
  resolution: "720P"
  silent_audio: true
  all_shots: true
  require_video: true
  clip_duration_sec: 10
  keyframe_mode: single
  inter_shot_delay_sec: 0
  max_parallel_shots: 2
  motion_prompt_suffix: "，镜头缓慢推进，人物动作小幅连贯，禁止静态海报定格"
  wmreward_bon:
    enabled: false

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.35
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.22

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.20
  video_per_second: 0.10

cost_targets_cny:
  llm: [4, 8]
  tts: [2, 5]
  image: [3, 6]
  video: [4, 10]
  total: [18, 28]
