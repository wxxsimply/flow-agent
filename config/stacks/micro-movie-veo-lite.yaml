# Gemini Veo 3.1 Lite — Seedream 关键帧 + Veo i2v，LLM/TTS 仍用 DeepSeek + 百炼
# 需在 providers.local.yaml 配置 gemini.api_key + volcengine.api_key（Seedream 出图）
# flowagent test-shot --stack micro-movie-veo-lite --image-prompt "..."
# flowagent compare-proplock --out ./tmp/proplock-compare

name: micro-movie-veo-lite
version: "1.0"
description: ~45s 样片 PoC；Seedream 关键帧 + Gemini Veo 3.1 Lite i2v

target_duration_sec: 45
cost_budget_cny: 15

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: dashscope
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: volcengine
  model: doubao-seedream-4-0-250828
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  style_prefix: |
    [STYLE] 竖屏 9:16，电影感，简洁构图
    [NEG] 文字、水印、多余手指

assemble:
  quick_assemble: true
  llm_review: false

video:
  enabled: true
  provider: gemini
  strategy: image2video
  model: veo-3.1-lite-generate-preview
  resolution: "720p"
  aspect_ratio: "9:16"
  silent_audio: true
  all_shots: true
  require_video: true
  ken_burns_fallback: true
  clip_duration_sec: 6
  max_produce_shots: 4
  keyframe_mode: single
  inter_shot_delay_sec: 0
  chain_shot_mode: hard
  chain_shot_keyframes: false
  max_parallel_shots: 1
  fast_poll: true
  motion_prompt_suffix: "，小幅连贯动作，禁止静态定格，禁止道具换手或变形"
  wmreward_bon:
    enabled: false

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.45
  clip_edge_fade_sec: 0.15
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.2

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.20
  video_per_second: 0.36

cost_targets_cny:
  llm: [1, 3]
  tts: [1, 2]
  image: [1, 3]
  video: [5, 10]
  total: [8, 15]
