# 方案 B：整片动效镜头 — 每镜可灵 mp4，合成禁止 Ken Burns
# flowagent run novel-short-douyin --series demo --episode 1 --auto-gate

name: video-native-short
version: "1.0"
description: 竖屏短剧 ~90s/集；全镜可灵图生视频动效 + TTS（无静图幻灯片）

target_duration_sec: 90
cost_budget_cny: 80

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
    stream: true
    chunk_max_tokens: 600
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
    fallback_model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: default
  format: mp3
  ssml: true

image:
  provider: bailian
  model: wan2.6-t2i
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  shots_per_episode: 0
  style_prefix: |
    [STYLE] 国漫爽文解说风，高对比，cinematic lighting，竖构图 9:16
    [NEG] 文字、水印、多余手指、横构图

video:
  enabled: true
  all_shots: true
  strategy: image2video             # 全镜：万相关键帧 → 可灵图生视频（成片全是动效 mp4）
  skip_image: false
  require_video: true
  fallback_image2video: false
  provider: kling
  model: kling-v2-5-turbo
  text_model: kling-v1-6             # 仅 strategy=text2video 或 all_motion 时使用
  image2video_model: kling-v2-1
  mode: std
  aspect_ratio: "9:16"
  clip_duration_sec: 5
  motion_prompt_suffix: "，竖屏9:16，镜头有运镜，人物有肢体动作与表情变化，禁止静态定格海报"

compose:
  engine: ffmpeg
  video_native_only: true           # 合成只用 mp4，禁止 Ken Burns / 静图兜底
  subtitle_safe_area: douyin_vertical
  subtitle_format: ass
  shot_audio_pad_sec: 0.15
  clip_crossfade_sec: 0.35
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: false

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.38
  video_per_second: 0.28

cost_targets_cny:
  llm: [5, 12]
  tts: [3, 8]
  image: [0, 8]
  video: [20, 45]
  other: [2, 8]
  total: [35, 80]
