# FlowAgent 标准档技术栈 — 个人开发者默认
# 说明见 docs/NOVEL_STREAM_VIDEO_PUBLISH_PROPOSAL.md §9

name: standard-tier
version: "1.0"
description: 竖屏短剧连载（约90秒/集）；Ken Burns + 万相出图 + 百炼TTS

target_duration_sec: 90
cost_budget_cny: 50

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com
  writer:
    provider: deepseek
    model: deepseek-v4-flash
    stream: true
    chunk_max_tokens: 600
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
    fallback_model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: default
  format: mp3
  ssml: true

image:
  provider: bailian     # 万相文生图，与 dashscope 同 Key
  model: wan2.6-t2i     # 见百炼万相文档；旧 wanx-v1 可升级
  alternative_provider: jimeng
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  shots_per_episode: 32
  style_prefix: |
    [STYLE] 国漫爽文解说风，高对比，cinematic lighting，竖构图 9:16
    [NEG] 文字、水印、多余手指、横构图

video:
  enabled: false          # 关闭可灵；纯 Ken Burns + 万相静图
  provider: kling
  model: kling-v2-5-turbo
  mode: std
  max_clips: 6
  clip_duration_sec: 5
  only_when: ai_video_budget

compose:
  engine: ffmpeg
  post: jianying
  subtitle_safe_area: douyin_vertical
  subtitle_format: ass
  shot_audio_pad_sec: 0.15
  clip_crossfade_sec: 0.35
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: false
  bgm_path: assets/bgm/default.mp3
  bgm_volume: 0.25

publish:
  mode: export_pack
  platforms:
    - douyin

# 用量 → 人民币折算单价（可被 cost.Recorder 读取）
unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.38
  video_per_second: 0.25

cost_targets_cny:
  llm: [5, 10]
  tts: [3, 6]
  image: [12, 22]
  video: [8, 15]
  other: [2, 5]
  total: [25, 60]
