# 微电影默认栈 — 火山方舟 Seedream 出图 + Seedance i2v（百炼欠费时可全走火山）
# 需在 providers.local.yaml 配置 volcengine.api_key（方舟 API Key）
# flowagent run micro-movie --plot "..." --stack micro-movie-wan-flash --auto-gate
# 百炼恢复后可将 image/video provider 改回 bailian + wan2.6-*

name: micro-movie-wan-flash
version: "1.0"
description: 微电影 ~3min；Seedream 关键帧 + Seedance i2v 全镜动效

target_duration_sec: 150
cost_budget_cny: 55

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
    fallback_model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: volcengine
  model: doubao-seedream-4-0-250828
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  use_turnaround_seed: true
  style_prefix: |
    [STYLE] 电影感竖屏 9:16，写实与插画混合，高对比光影
    [NEG] 文字、水印、多余手指、横构图

assemble:
  llm_review: true
  prop_turnaround: true

video:
  enabled: true
  provider: volcengine
  strategy: image2video
  model: doubao-seedance-1-5-pro-251215
  # 若已在方舟开通 Seedance 2.0，可改为 doubao-seedance-2-0-260128
  resolution: "720P"
  silent_audio: true
  all_shots: true
  require_video: true
  ken_burns_fallback: true
  clip_duration_sec: 8
  keyframe_mode: tiered
  hero_shot_count: 3
  max_produce_shots: 12
  inter_shot_delay_sec: 1
  max_parallel_shots: 1
  fast_poll: true
  motion_prompt_suffix: "，固定机位，人物单一主动作、幅度极小连贯，禁止推拉摇移与静态海报定格，禁止穿模与瞬间位移"
  # BoN：tiered hero_only — 非 hero 1× i2v，hero 镜 ×candidates；12 镜约 17 次 video API
  wmreward_bon:
    enabled: true
    hero_only: true
    candidates: 2
    script_path: scripts/wmreward/compute_vjepa_surprise_wrapper.py
    # 无 GPU 时改用连通性桩：script_path: scripts/wmreward/compute_surprise.py

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.4
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.22

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.20
  video_per_second: 0.15

cost_targets_cny:
  llm: [6, 12]
  tts: [4, 8]
  image: [6, 10]
  video: [12, 22]
  total: [35, 55]
