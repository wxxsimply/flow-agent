# 火山方舟栈 — Seedream 出图 + Seedance 图生视频（Studio 唯一方案）
# 预算：每 30 秒成片 ≤ 5 元（cost_budget_per_30_sec_cny）
# 用户密钥在 Studio 设置页填写，无需编辑 providers.local.yaml 的 volcengine 段

name: micro-movie-seedance
version: "1.0"
description: 成片 · 每 30 秒预算 5 元；Seedream + Seedance 1.5 i2v

target_duration_sec: 30
cost_budget_per_30_sec_cny: 5

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: volcengine
  model: doubao-seedream-4-0-250828
  aspect_ratio: "9:16"
  resolution: "720x1280"
  use_turnaround_seed: false
  style_prefix: |
    [STYLE] 竖屏 9:16，电影感，简洁构图
    [NEG] 文字、水印、多余手指

assemble:
  quick_assemble: true
  llm_review: false
  character_turnaround: false
  prop_turnaround: false
  brief_runes_min: 600
  brief_runes_max: 1000
  brief_runes_floor: 500
  brief_segment_count: 2

video:
  enabled: true
  provider: volcengine
  strategy: image2video
  model: doubao-seedance-1-5-pro-251215
  resolution: "720P"
  silent_audio: true
  all_shots: true
  require_video: true
  ken_burns_fallback: true
  clip_duration_sec: 5
  enforce_clip_duration_cap: true
  max_produce_shots: 8
  keyframe_mode: single
  inter_shot_delay_sec: 0
  chain_shot_mode: soft
  chain_shot_keyframes: false
  max_parallel_shots: 2
  fast_poll: true
  motion_prompt_suffix: "，小幅连贯动作，禁止静态定格"
  wmreward_bon:
    enabled: false

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.25
  clip_edge_fade_sec: 0.12
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 3
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.2

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.10
  image_per_shot: 0.15
  video_per_second: 0.10

cost_targets_cny:
  llm: [0.3, 1.2]
  tts: [0.05, 0.4]
  image: [0.5, 1.2]
  video: [1.5, 3.0]
  total: [2, 5]
