# 5 元封顶栈 — ~18s / 3 镜 / 无 BoN / 快速组装
# flowagent run micro-movie --plot "..." --stack micro-movie-cap5 --auto-gate
# Studio 默认栈；完整跑片（扩写审阅 + produce）目标 total ≤ 5 元

name: micro-movie-cap5
version: "1.0"
description: 样片 · 封顶 5 元；~18s / 3 镜 Seedance i2v

target_duration_sec: 18
cost_budget_cny: 5

llm:
  planner:
    provider: deepseek
    model: deepseek-v4-flash
  writer:
    provider: deepseek
    model: deepseek-v4-flash
  continuity:
    provider: deepseek
    model: deepseek-v4-flash
  storyboard:
    provider: deepseek
    model: deepseek-v4-flash
  compliance:
    provider: deepseek
    model: deepseek-v4-flash

tts:
  provider: volcengine
  product: doubao-speech-2.0-emotion
  voices:
    narrator: epic_male
  format: mp3
  ssml: true

image:
  provider: volcengine
  model: doubao-seedream-4-0-250828
  aspect_ratio: "9:16"
  resolution: "720x1280"
  style_prefix: |
    [STYLE] 竖屏 9:16，简洁电影感
    [NEG] 文字、水印、多余手指

assemble:
  quick_assemble: false
  llm_review: false
  brief_runes_min: 2000
  brief_runes_max: 2400
  brief_runes_floor: 1800
  brief_segment_count: 2

video:
  enabled: true
  provider: volcengine
  strategy: image2video
  model: doubao-seedance-1-5-pro-251215
  resolution: "720P"
  silent_audio: true
  all_shots: true
  require_video: true
  ken_burns_fallback: false
  clip_duration_sec: 4
  chain_shot_mode: soft
  max_produce_shots: 3
  keyframe_mode: single
  inter_shot_delay_sec: 0
  max_parallel_shots: 3
  fast_poll: true
  motion_prompt_suffix: "，固定机位，单一小幅动作，禁止静态定格"
  wmreward_bon:
    enabled: false

compose:
  engine: ffmpeg
  video_native_only: true
  clip_crossfade_sec: 0.2
  subtitle_format: ass
  subtitle_chars_per_line: 14
  subtitle_max_lines: 2
  bgm_enabled: true
  bgm_library: assets/bgm
  bgm_volume: 0.18

publish:
  mode: export_pack
  platforms:
    - douyin

unit_prices_cny:
  llm_input_per_1k_tokens: 0.0014
  llm_output_per_1k_tokens: 0.0028
  tts_per_1k_chars: 0.12
  image_per_shot: 0.20
  video_per_second: 0.15

cost_targets_cny:
  llm: [0.2, 1]
  tts: [0.05, 0.3]
  image: [0.4, 0.8]
  video: [1.2, 2.5]
  total: [2, 5]
