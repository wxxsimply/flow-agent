# 可选：Nginx 反向代理 + HTTPS
# 1. 安装 certbot: apt install nginx certbot python3-certbot-nginx
# 2. 修改 server_name 为你的域名
# 3. sudo cp deploy/nginx/flowagent.conf /etc/nginx/sites-available/flowagent
# 4. sudo ln -s /etc/nginx/sites-available/flowagent /etc/nginx/sites-enabled/
# 5. sudo nginx -t && sudo systemctl reload nginx
# 6. sudo certbot --nginx -d your.domain.com

server {
    listen 80;
    server_name your.domain.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
