name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o bin/flowagent ./cmd/flowagent

  physics-iq-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Motion quality gate tests
        run: go test ./internal/runner/... -count=1 -run 'MotionQuality|AudioDuration'

      - name: Physics-IQ dry-run script
        run: bash scripts/eval-physics-iq.sh
