services:
  flowagent:
    build: .
    ports:
      - "${FLOWAGENT_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      FLOWAGENT_AUTH_ENABLED: "true"
      FLOWAGENT_DATA_DIR: /data
    volumes:
      # 数据持久化：runs、用户库、API 密钥都在 ./data 下，便于备份
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
